apiVersion: apps/v1
kind: Deployment
metadata:
  name: sharewithme
  labels:
    app: sharewithme
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sharewithme
  template:
    metadata:
      labels:
        app: sharewithme
    spec:
      containers:
        - name: sharewithme
          image: kicsipixel/sharewithme:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: OCI_REGION
              value: "eu-frankfurt-1"
---
apiVersion: v1
kind: Service
metadata:
  name: sharewithme-svc
spec:
  type: NodePort
  selector:
    app: sharewithme
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
